    <path d="M17.19,25.9c-2.31-2.92-3.84-7.55-3.84-12.8C13.35,5.13,20,0,20,0s6.65,5.13,6.65,13.1c0,5.25-1.53,9.88-3.84,12.8 C21.41,27.67,20,32,20,32S18.59,27.67,17.19,25.9z" fill="#4CAF50"/>
  </g>
  
