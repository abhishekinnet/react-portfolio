<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34B29E"/>
      <stop offset="100%" stop-color="#0E7E8B"/>
    </linearGradient>
  </defs>
  
  <circle cx="100" cy="100" r="95" fill="#f8fbfc" />
  
  <g transform="translate(25, 12) scale(0.75)">
    <!-- Outer Border Box -->
    <rect x="0" y="0" width="200" height="205" rx="20" fill="#ffffff" stroke="#a0c8d6" stroke-width="4"/>
    
    <!-- Mountain/Arrow Trend -->
    <path d="M 20 120 L 70 80 L 110 100 L 170 40 L 170 120 Z" fill="url(#chartGrad)" opacity="0.6"/>
    <path d="M 20 120 L 70 80 L 110 100 L 170 40" fill="none" stroke="#2D8C86" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Orange Arrow Head at top right -->
    <path d="M 155 45 L 170 40 L 165 55 Z" fill="#F39C12"/>
    <path d="M 160 50 L 180 30" stroke="#F39C12" stroke-width="5" stroke-linecap="round"/>
    
    <!-- People climbing -->
    <!-- Person 1 (Leader with flag) -->
    <circle cx="140" cy="55" r="8" fill="#094A65"/>
    <path d="M 130 90 L 140 68 L 150 90" fill="none" stroke="#094A65" stroke-width="5" stroke-linecap="round"/>
    <line x1="140" y1="63" x2="140" y2="75" stroke="#094A65" stroke-width="5" stroke-linecap="round"/>
    <!-- Flag -->
    <line x1="150" y1="75" x2="150" y2="35" stroke="#094A65" stroke-width="3"/>
    <path d="M 150 35 L 170 40 L 150 50 Z" fill="#E74C3C"/>
    
    <!-- Person 2 -->
    <circle cx="90" cy="85" r="7" fill="#094A65"/>
    <line x1="90" y1="92" x2="90" y2="105" stroke="#094A65" stroke-width="5" stroke-linecap="round"/>
    <path d="M 82 115 L 90 100 L 98 115" fill="none" stroke="#094A65" stroke-width="5" stroke-linecap="round"/>
    <line x1="80" y1="100" x2="98" y2="100" stroke="#094A65" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Person 3 -->
    <circle cx="50" cy="100" r="6" fill="#094A65"/>
    <line x1="50" y1="106" x2="50" y2="115" stroke="#094A65" stroke-width="4" stroke-linecap="round"/>
    <path d="M 44 125 L 50 115 L 56 125" fill="none" stroke="#094A65" stroke-width="4" stroke-linecap="round"/>
    <line x1="42" y1="110" x2="56" y2="110" stroke="#094A65" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Three bottom circles -->
    <!-- Circle 1: Handshake -->
    <circle cx="45" cy="155" r="22" fill="#f4f9f9" stroke="#2980B9" stroke-width="4"/>
    <!-- Two hands greeting -->
    <path d="M 32 155 Q 38 145 45 152 Q 52 145 58 155" fill="none" stroke="#E67E22" stroke-width="3" stroke-linecap="round"/>
    <path d="M 32 155 L 45 162 L 58 155" fill="none" stroke="#E67E22" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="45" cy="152" r="3" fill="#E67E22"/>
    
    <!-- Circle 2: Clipboard -->
    <circle cx="100" cy="155" r="22" fill="#f4f9f9" stroke="#27AE60" stroke-width="4"/>
    <rect x="90" y="145" width="20" height="24" rx="2" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <line x1="95" y1="152" x2="105" y2="152" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
    <line x1="95" y1="157" x2="105" y2="157" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
    <line x1="95" y1="162" x2="100" y2="162" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
    <!-- Clipboard clip -->
    <rect x="96" y="142" width="8" height="3" fill="#2c3e50" rx="1"/>
    
    <!-- Circle 3: Gears -->
    <circle cx="155" cy="155" r="22" fill="#f4f9f9" stroke="#D35400" stroke-width="4"/>
    <path d="M 149 143 V 155 M 143 149 H 155 M 145 145 L 153 153 M 145 153 L 153 145" stroke="#F1C40F" stroke-width="4" stroke-linecap="round"/>
    <circle cx="149" cy="149" r="3" fill="#2c3e50"/>
    
    <path d="M 161 155 V 167 M 155 161 H 167 M 157 157 L 165 165 M 157 165 L 165 157" stroke="#E67E22" stroke-width="4" stroke-linecap="round"/>
    <circle cx="161" cy="161" r="3" fill="#2c3e50"/>
    
    <!-- Text at bottom -->
    <text x="100" y="186" font-family="'Segoe UI', Trebuchet MS, Arial, sans-serif" font-weight="900" font-size="12" fill="#094A65" text-anchor="middle" letter-spacing="0.5">MANAGEMENT &amp;</text>
    <text x="100" y="199" font-family="'Segoe UI', Trebuchet MS, Arial, sans-serif" font-weight="900" font-size="12" fill="#094A65" text-anchor="middle" letter-spacing="0.5">LEADERSHIP SKILLS</text>
  </g>
</svg>
