<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background drop shadow equivalent -->
  <rect x="110" y="60" width="240" height="340" rx="20" fill="#e2e8f0"/>
  <!-- Document -->
  <rect x="100" y="50" width="240" height="340" rx="20" fill="white" stroke="#94a3b8" stroke-width="16"/>
  <!-- Lines on doc -->
  <line x1="140" y1="120" x2="300" y2="120" stroke="#cbd5e1" stroke-width="16" stroke-linecap="round"/>
  <line x1="140" y1="180" x2="300" y2="180" stroke="#cbd5e1" stroke-width="16" stroke-linecap="round"/>
  <line x1="140" y1="240" x2="260" y2="240" stroke="#cbd5e1" stroke-width="16" stroke-linecap="round"/>
  <line x1="140" y1="300" x2="220" y2="300" stroke="#cbd5e1" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Magnifying glass Handle -->
  <line x1="370" y1="370" x2="480" y2="480" stroke="#334155" stroke-width="50" stroke-linecap="round"/>
  <line x1="380" y1="380" x2="470" y2="470" stroke="#475569" stroke-width="20" stroke-linecap="round"/>
  <!-- Magnifying glass Lens -->
  <circle cx="300" cy="300" r="100" fill="#e0e7ff" fill-opacity="0.8" stroke="#3b82f6" stroke-width="32"/>
  <circle cx="300" cy="300" r="70" fill="url(#lensGrad)" fill-opacity="0.4"/>
  <!-- Magnifying glass glint -->
  <path d="M 250 250 A 60 60 0 0 1 310 240" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
</svg>
