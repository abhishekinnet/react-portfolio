<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="95" fill="#f8fbfc" />
  
  <g transform="translate(14, 14) scale(0.86)">
    
    <!-- Connection Lines and Arrows -->
    <!-- From User to Web -->
    <path d="M 45 40 L 80 40" fill="none" stroke="#2980B9" stroke-width="3" marker-end="url(#arrowBlue)" />
    <!-- From Web to Cloud -->
    <path d="M 120 40 L 155 40" fill="none" stroke="#2980B9" stroke-width="3" marker-end="url(#arrowBlue)" />
    <!-- From Web to Core -->
    <path d="M 100 60 L 100 85" fill="none" stroke="#2980B9" stroke-width="3" marker-end="url(#arrowBlue)" />
    <!-- From Core to DB -->
    <path d="M 70 105 L 40 105 L 40 145" fill="none" stroke="#27AE60" stroke-width="3" marker-end="url(#arrowGreen)" />
    <!-- From Core to API -->
    <path d="M 130 105 L 145 105" fill="none" stroke="#27AE60" stroke-width="3" marker-end="url(#arrowGreen)" />
    <!-- From API to Analytics -->
    <path d="M 165 120 L 165 140" fill="none" stroke="#E67E22" stroke-width="3" marker-end="url(#arrowOrange)" />
    <!-- DB to Core (Return) -->
    <path d="M 55 160 L 100 160 L 100 130" fill="none" stroke="#E67E22" stroke-width="3" marker-end="url(#arrowOrange)" />
    
    <!-- Markers -->
    <defs>
      <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M 0 0 L 6 3 L 0 6 Z" fill="#2980B9" />
      </marker>
      <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M 0 0 L 6 3 L 0 6 Z" fill="#E67E22" />
      </marker>
      <marker id="arrowGreen" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M 0 0 L 6 3 L 0 6 Z" fill="#27AE60" />
      </marker>
      <clipPath id="clipTopLeft">
         <rect x="80" y="20" width="40" height="10" rx="4"/>
      </clipPath>
      <clipPath id="clipTopRight">
         <rect x="145" y="85" width="40" height="8" rx="4"/>
      </clipPath>
    </defs>

    <!-- Block 1: User/Client (Top Left) -->
    <rect x="15" y="25" width="30" height="30" rx="4" fill="#ffffff" stroke="#2980B9" stroke-width="3"/>
    <circle cx="30" cy="35" r="5" fill="#2980B9"/>
    <path d="M 22 47 C 22 41 38 41 38 47" fill="none" stroke="#2980B9" stroke-width="3"/>

    <!-- Block 2: Web Server (Top Center) -->
    <rect x="80" y="20" width="40" height="35" rx="4" fill="#ffffff" stroke="#2980B9" stroke-width="3"/>
    <rect x="80" y="20" width="40" height="10" fill="#2980B9" clip-path="url(#clipTopLeft)" />
    <circle cx="86" cy="25" r="2" fill="#ffffff"/>
    <circle cx="92" cy="25" r="2" fill="#ffffff"/>
    <line x1="85" y1="35" x2="115" y2="35" stroke="#E67E22" stroke-width="3"/>
    <line x1="85" y1="43" x2="105" y2="43" stroke="#BDC3C7" stroke-width="3"/>
    <line x1="85" y1="49" x2="95" y2="49" stroke="#BDC3C7" stroke-width="3"/>

    <!-- Block 3: Cloud / Node (Top Right) -->
    <rect x="155" y="20" width="30" height="40" rx="4" fill="#ffffff" stroke="#27AE60" stroke-width="3"/>
    <rect x="160" y="26" width="20" height="12" fill="#27AE60" rx="2" />
    <circle cx="170" cy="46" r="4" fill="#27AE60"/>
    <line x1="165" y1="54" x2="175" y2="54" stroke="#27AE60" stroke-width="2"/>

    <!-- Block 4: Core Logic / App Server (Center) -->
    <rect x="70" y="85" width="60" height="45" rx="4" fill="#ffffff" stroke="#27AE60" stroke-width="3"/>
    <rect x="75" y="90" width="50" height="35" fill="#E8F8F5" rx="2" />
    <!-- Node network icon inside core -->
    <circle cx="90" cy="100" r="4" fill="#27AE60"/>
    <circle cx="110" cy="100" r="4" fill="#27AE60"/>
    <circle cx="100" cy="115" r="4" fill="#27AE60"/>
    <path d="M 90 100 L 110 100 L 100 115 Z" fill="none" stroke="#27AE60" stroke-width="2"/>
    
    <!-- Block 5: API / Service (Right Center inside flow) -->
    <rect x="145" y="85" width="40" height="30" rx="4" fill="#ffffff" stroke="#2980B9" stroke-width="3"/>
    <rect x="145" y="85" width="40" height="8" fill="#2980B9" clip-path="url(#clipTopRight)"/>
    <line x1="150" y1="100" x2="175" y2="100" stroke="#E67E22" stroke-width="3"/>
    <line x1="150" y1="108" x2="165" y2="108" stroke="#BDC3C7" stroke-width="3"/>

    <!-- Block 6: Database Stack (Bottom Left) -->
    <path d="M 25 145 C 25 140 55 140 55 145 V 170 C 55 175 25 175 25 170 Z" fill="#ffffff" stroke="#2980B9" stroke-width="3"/>
    <path d="M 25 145 C 25 150 55 150 55 145" fill="none" stroke="#2980B9" stroke-width="3"/>
    <path d="M 25 153 C 25 158 55 158 55 153" fill="none" stroke="#2980B9" stroke-width="3"/>
    <path d="M 25 161 C 25 166 55 166 55 161" fill="none" stroke="#2980B9" stroke-width="3"/>
    <path d="M 33 157 H 47 M 33 164 H 47" stroke="#34495E" stroke-width="2" stroke-linecap="round"/>

    <!-- Block 7: Analytics / Chart (Bottom Right) -->
    <rect x="145" y="140" width="40" height="30" rx="4" fill="#ffffff" stroke="#34495E" stroke-width="3"/>
    <rect x="150" y="145" width="30" height="20" rx="2" fill="#FDF2E9" />
    <path d="M 152 161 L 160 152 L 167 156 L 175 148" fill="none" stroke="#E67E22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="152" cy="161" r="1.5" fill="#E67E22"/>
    <circle cx="160" cy="152" r="1.5" fill="#E67E22"/>
    <circle cx="167" cy="156" r="1.5" fill="#E67E22"/>
    <circle cx="176" cy="147" r="1.5" fill="#E67E22"/>
  </g>
</svg>
